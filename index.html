<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zyntra — Mobile App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #0d1a3a 0%, #050810 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 0; }
  button { font-family: 'DM Sans', system-ui, sans-serif; }
  input { font-family: 'DM Sans', system-ui, sans-serif; }

  /* Label de tela visível no canvas */
  .screen-label {
    position: absolute;
    top: -28px; left: 0;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
    font-family: 'DM Sans', sans-serif;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═══════════════════════════════════════════════════════════════════
// iOS Frame Component
// ═══════════════════════════════════════════════════════════════════
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{ fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590, fontSize: 17, lineHeight: '22px', color: c }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/><circle cx="8.5" cy="10.5" r="1.5" fill={c}/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
      </div>
    </div>
  );
}

function IOSDevice({ children, width = 402, height = 874, dark = false }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{ width: 139, height: 5, borderRadius: 100, background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)' }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Design Tokens & Shared Components
// ═══════════════════════════════════════════════════════════════════
const Z = {
  bg: '#090C14', surface: '#0F1520', card: '#131A28', card2: '#1A2236',
  border: '#1E2A42', borderLight: '#253350', accent: '#3B82F6',
  accentDim: 'rgba(59,130,246,0.18)', accentGlow: 'rgba(59,130,246,0.10)',
  text: '#EEF2FF', textSoft: '#B8C4DC', muted: '#5A6882', mutedLight: '#8898B4',
  green: '#22C55E', greenDim: 'rgba(34,197,94,0.15)',
  red: '#EF4444', redDim: 'rgba(239,68,68,0.15)',
  yellow: '#F59E0B', yellowDim: 'rgba(245,158,11,0.15)',
  purple: '#A855F7', purpleDim: 'rgba(168,85,247,0.15)',
  teal: '#14B8A6', tealDim: 'rgba(20,184,166,0.15)',
  orange: '#F97316', orangeDim: 'rgba(249,115,22,0.15)',
  font: "'DM Sans', system-ui, sans-serif",
};

const MODULES = [
  { id: 'financeiro', label: 'Financeiro', color: Z.accent, dim: Z.accentDim },
  { id: 'vendas', label: 'Vendas', color: Z.green, dim: Z.greenDim },
  { id: 'rh', label: 'RH', color: Z.purple, dim: Z.purpleDim },
  { id: 'pcp', label: 'PCP', color: Z.yellow, dim: Z.yellowDim },
  { id: 'logistica', label: 'Logística', color: Z.teal, dim: Z.tealDim },
  { id: 'faturamento', label: 'Faturamento', color: Z.red, dim: Z.redDim },
  { id: 'compras', label: 'Compras', color: Z.orange, dim: Z.orangeDim },
];

// Icons
function IcHome({ s=22, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9v9h-6v-5H9v5H3v-9z" stroke={c} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/></svg>; }
function IcGrid({ s=22, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke={c} strokeWidth="1.8"/><rect x="13" y="3" width="8" height="8" rx="2" stroke={c} strokeWidth="1.8"/><rect x="3" y="13" width="8" height="8" rx="2" stroke={c} strokeWidth="1.8"/><rect x="13" y="13" width="8" height="8" rx="2" stroke={c} strokeWidth="1.8"/></svg>; }
function IcBell({ s=22, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M6 10c0-3.314 2.686-6 6-6s6 2.686 6 6v4l2 2H4l2-2v-4z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/><path d="M10 20h4" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>; }
function IcUser({ s=22, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke={c} strokeWidth="1.8"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>; }
function IcBack({ s=20, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>; }
function IcChev({ s=14, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>; }
function IcSearch({ s=18, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke={c} strokeWidth="1.8"/><path d="M16.5 16.5L21 21" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>; }
function IcPlus({ s=18, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke={c} strokeWidth="2" strokeLinecap="round"/></svg>; }
function IcFilter({ s=18, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 6h18M7 12h10M10 18h4" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>; }
function IcTrendUp({ s=14, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 17l6-6 4 4 8-8" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>; }
function IcTrendDown({ s=14, c='currentColor' }) { return <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 7l6 6 4-4 8 8" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>; }

function ModIcon({ id, s=20, c }) {
  const col = c || (MODULES.find(m=>m.id===id)||{color:Z.accent}).color;
  const icons = {
    financeiro: <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={col} strokeWidth="1.8"/><path d="M12 7v1m0 8v1M9.5 9.5c0-1 1.1-1.5 2.5-1.5s2.5.7 2.5 1.8c0 1-1 1.7-2.5 1.7S9.5 12.2 9.5 13.2c0 1.1 1.1 1.8 2.5 1.8s2.5-.5 2.5-1.5" stroke={col} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    vendas: <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 17l5-5 4 4 9-9" stroke={col} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"/><path d="M14 7h5v5" stroke={col} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    rh: <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="3.5" stroke={col} strokeWidth="1.7"/><path d="M2 19c0-3.5 3.1-6 7-6" stroke={col} strokeWidth="1.7" strokeLinecap="round"/><circle cx="17" cy="8" r="2.5" stroke={col} strokeWidth="1.6"/><path d="M22 19c0-2.8-2.2-5-5-5" stroke={col} strokeWidth="1.7" strokeLinecap="round"/></svg>,
    pcp: <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke={col} strokeWidth="1.8"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke={col} strokeWidth="1.8" strokeLinecap="round"/></svg>,
    logistica: <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="1" y="8" width="14" height="10" rx="2" stroke={col} strokeWidth="1.7"/><path d="M15 12h4l3 4v2h-7V12z" stroke={col} strokeWidth="1.7" strokeLinejoin="round"/><circle cx="5.5" cy="19.5" r="1.5" stroke={col} strokeWidth="1.5"/><circle cx="17.5" cy="19.5" r="1.5" stroke={col} strokeWidth="1.5"/></svg>,
    faturamento: <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke={col} strokeWidth="1.7" strokeLinejoin="round"/><path d="M14 2v6h6M9 13h6M9 17h4" stroke={col} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    compras: <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z" stroke={col} strokeWidth="1.7" strokeLinejoin="round"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0" stroke={col} strokeWidth="1.7" strokeLinecap="round"/></svg>,
  };
  return icons[id] || null;
}

// Base UI
function ZCard({ children, style={}, onClick }) {
  return <div onClick={onClick} style={{ background: Z.card, borderRadius: 16, border: `1px solid ${Z.border}`, cursor: onClick ? 'pointer' : 'default', ...style }}>{children}</div>;
}
function ZBadge({ label, color, bg, size=11 }) {
  return <span style={{ fontSize: size, fontWeight: 600, letterSpacing: 0.3, color, background: bg, padding: '3px 8px', borderRadius: 20, fontFamily: Z.font, whiteSpace: 'nowrap' }}>{label}</span>;
}
function StatusPill({ label, color, bg }) {
  return <span style={{ fontSize: 10, fontWeight: 700, color, background: bg, padding: '3px 8px', borderRadius: 20, fontFamily: Z.font, letterSpacing: 0.4 }}>{label}</span>;
}
function SectionLabel({ text }) {
  return <div style={{ fontSize: 11, fontWeight: 700, color: Z.muted, fontFamily: Z.font, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 8, paddingLeft: 2 }}>{text}</div>;
}
function SparkLine({ data, color, h=36, w=90 }) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
  const pts = data.map((v, i) => `${(i/(data.length-1))*w},${h-((v-min)/range)*(h-6)-3}`).join(' ');
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none"><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
function KPICard({ title, value, sub, change, up, color, spark, style={} }) {
  return (
    <ZCard style={{ padding: '14px 14px 12px', ...style }}>
      <div style={{ fontSize: 10, color: Z.muted, fontFamily: Z.font, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 6 }}>{title}</div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div>
          <div style={{ fontSize: 21, fontWeight: 700, color: Z.text, fontFamily: Z.font, lineHeight: 1.1 }}>{value}</div>
          {sub && <div style={{ fontSize: 11, color: Z.muted, fontFamily: Z.font, marginTop: 2 }}>{sub}</div>}
          {change && <div style={{ display: 'flex', alignItems: 'center', gap: 3, marginTop: 4, color: up ? Z.green : Z.red }}>{up ? <IcTrendUp s={11} c={Z.green}/> : <IcTrendDown s={11} c={Z.red}/>}<span style={{ fontSize: 11, fontWeight: 600, fontFamily: Z.font }}>{change}</span></div>}
        </div>
        {spark && <SparkLine data={spark} color={color} h={34} w={80}/>}
      </div>
    </ZCard>
  );
}
function ScreenHeader({ title, onBack, right, bg }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', height: 50, flexShrink: 0, background: bg || 'transparent' }}>
      {onBack ? <button onClick={onBack} style={{ background: 'none', border: 'none', padding: '6px 0', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 2, color: Z.accent }}><IcBack s={18} c={Z.accent}/><span style={{ fontFamily: Z.font, fontSize: 15, fontWeight: 500, color: Z.accent }}>Voltar</span></button> : <div style={{ width: 60 }}/>}
      <div style={{ fontSize: 16, fontWeight: 700, color: Z.text, fontFamily: Z.font }}>{title}</div>
      <div style={{ width: 60, display: 'flex', justifyContent: 'flex-end' }}>{right}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Login Screen
// ═══════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [tab, setTab] = useState('email');
  const [field, setField] = useState('');
  const [senha, setSenha] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState(false);

  const handle = () => { setLoading(true); setTimeout(() => { setSuccess(true); setTimeout(onLogin, 600); }, 1200); };

  const inp = { width: '100%', background: Z.surface, border: `1px solid ${Z.border}`, borderRadius: 13, padding: '14px 16px', fontSize: 15, color: Z.text, fontFamily: Z.font, outline: 'none', boxSizing: 'border-box', WebkitAppearance: 'none' };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: Z.bg, overflow: 'hidden', position: 'relative' }}>
      <div style={{ position: 'absolute', top: -100, left: '50%', transform: 'translateX(-50%)', width: 360, height: 360, borderRadius: '50%', background: 'radial-gradient(circle, rgba(59,130,246,0.13) 0%, transparent 70%)', pointerEvents: 'none' }}/>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '0 28px', gap: 0 }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: 36 }}>
          <div style={{ width: 72, height: 72, borderRadius: 20, background: Z.card, border: `1px solid ${Z.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 8px 32px rgba(59,130,246,0.18)', overflow: 'hidden' }}>
            <img src="uploads/logo-1777551715119.png" style={{ width: 52, height: 52, objectFit: 'contain', filter: 'invert(1) brightness(2)' }} alt="Zyntra"/>
          </div>
          <div style={{ marginTop: 14, fontSize: 28, fontWeight: 700, color: Z.text, fontFamily: Z.font, letterSpacing: -0.5 }}>Zyntra</div>
          <div style={{ fontSize: 13, color: Z.muted, fontFamily: Z.font, marginTop: 2 }}>Plataforma ERP Completa</div>
        </div>
        <div style={{ display: 'flex', background: Z.surface, borderRadius: 11, padding: 3, marginBottom: 16, border: `1px solid ${Z.border}` }}>
          {['email','cpf'].map(t => <button key={t} onClick={() => setTab(t)} style={{ flex: 1, padding: '8px 0', borderRadius: 9, border: 'none', cursor: 'pointer', background: tab === t ? Z.accent : 'transparent', color: tab === t ? '#fff' : Z.muted, fontSize: 13, fontWeight: 700, fontFamily: Z.font, letterSpacing: 0.3, transition: 'all 0.2s' }}>{t.toUpperCase()}</button>)}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 11, marginBottom: 8 }}>
          <input style={inp} placeholder={tab === 'email' ? 'E-mail corporativo' : 'CPF (000.000.000-00)'} value={field} onChange={e => setField(e.target.value)} type={tab === 'email' ? 'email' : 'text'}/>
          <div style={{ position: 'relative' }}>
            <input style={{ ...inp, paddingRight: 48 }} placeholder="Senha" type={showPass ? 'text' : 'password'} value={senha} onChange={e => setSenha(e.target.value)}/>
            <button onClick={() => setShowPass(!showPass)} style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z" stroke={Z.muted} strokeWidth="1.7"/><circle cx="12" cy="12" r="3" stroke={showPass ? Z.accent : Z.muted} strokeWidth="1.7"/></svg>
            </button>
          </div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 22 }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}><div style={{ width: 18, height: 18, borderRadius: 5, border: `1.5px solid ${Z.border}`, background: Z.surface }}/><span style={{ fontSize: 12, color: Z.muted, fontFamily: Z.font }}>Lembrar por 30 dias</span></label>
          <button style={{ background: 'none', border: 'none', color: Z.accent, fontSize: 13, fontFamily: Z.font, cursor: 'pointer', fontWeight: 500 }}>Esqueceu a senha?</button>
        </div>
        <button onClick={handle} disabled={loading} style={{ width: '100%', padding: '15px 0', borderRadius: 14, border: 'none', cursor: loading ? 'default' : 'pointer', background: success ? Z.green : loading ? `linear-gradient(135deg, #2563EB, #1D4ED8)` : `linear-gradient(135deg, #3B82F6, #2563EB)`, color: '#fff', fontSize: 16, fontWeight: 700, fontFamily: Z.font, boxShadow: loading ? 'none' : '0 6px 24px rgba(59,130,246,0.3)', transition: 'all 0.3s', letterSpacing: 0.2 }}>{success ? '✓ Login realizado!' : loading ? 'Entrando...' : 'Entrar'}</button>
      </div>
      <div style={{ padding: '14px 28px', textAlign: 'center', fontSize: 11, color: Z.muted, fontFamily: Z.font, flexShrink: 0 }}>© 2026 Zyntra — Desenvolvido por Agência do Japa</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Home / Dashboard Screen
// ═══════════════════════════════════════════════════════════════════
function HomeScreen({ onModuleOpen, onGoNotifications }) {
  const kpis = [

// ── Screen transition wrapper ────────────────────────────────
function AnimatedScreen({ children, screenKey }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    requestAnimationFrame(() => setVisible(true));
    return () => setVisible(false);
  }, [screenKey]);
  return (
    <div style={{
      position: 'absolute', inset: 0,
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateX(0)' : 'translateX(24px)',
      transition: 'opacity 0.22s ease, transform 0.22s ease',
    }}>
      {children}
    </div>
  );
}
